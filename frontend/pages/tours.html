<button onclick="bookTour()">Book tour</button>

<script>

function bookTour(){

fetch('/api/book', {
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
name:'Client',
hotel:'Intercontinental',
tour:'3 Islands',
date:'2026-03-10'
})
})
.then(res=>res.json())
.then(data=>{
alert(data.message)
})

}

</script>
